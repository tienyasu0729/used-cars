openapi: 3.0.3
info:
  title: SCUDN Used Cars API
  description: API documentation for the used cars platform
  version: 1.0.0

servers:
  - url: /
    description: API base URL (from VITE_API_URL)

tags:
  - name: Auth
  - name: Cars
  - name: Categories
  - name: Customer
  - name: Payment
  - name: Admin
  - name: Staff
  - name: Showroom
  - name: Finance
  - name: Inspector
  - name: Chat

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
      responses:
        '200':
          description: OK

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200':
          description: OK

  /cars:
    get:
      tags: [Cars]
      summary: Search cars
      parameters:
        - name: brand
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: location
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Car'
    post:
      tags: [Cars]
      summary: Create car listing
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarCreate'
      responses:
        '200':
          description: OK

  /cars/{id}:
    get:
      tags: [Cars]
      summary: Get car by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    patch:
      tags: [Cars]
      summary: Update car
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarUpdate'
      responses:
        '200':
          description: OK
    delete:
      tags: [Cars]
      summary: Delete car
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/categories:
    get:
      tags: [Categories]
      summary: Get car categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CarBrand'
    post:
      tags: [Categories]
      summary: Create category
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarBrandCreate'
      responses:
        '200':
          description: OK

  /api/categories/{id}:
    patch:
      tags: [Categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    delete:
      tags: [Categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /banners:
    get:
      tags: [Customer]
      summary: Get banners
      responses:
        '200':
          description: OK

  /appointments:
    get:
      tags: [Customer]
      summary: Get appointments
      responses:
        '200':
          description: OK
    post:
      tags: [Customer]
      summary: Create appointment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                carId: { type: string }
                date: { type: string }
                time: { type: string }
      responses:
        '200':
          description: OK

  /appointments/{id}:
    delete:
      tags: [Customer]
      summary: Cancel appointment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /favorites:
    get:
      tags: [Customer]
      summary: Get favorites
      responses:
        '200':
          description: OK

  /favorites/{carId}:
    post:
      tags: [Customer]
      summary: Add favorite
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    delete:
      tags: [Customer]
      summary: Remove favorite
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /transactions:
    get:
      tags: [Customer]
      summary: Get transactions
      responses:
        '200':
          description: OK

  /vouchers:
    get:
      tags: [Customer]
      summary: Get vouchers
      responses:
        '200':
          description: OK

  /profile:
    get:
      tags: [Customer]
      summary: Get profile
      responses:
        '200':
          description: OK
    patch:
      tags: [Customer]
      summary: Update profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
      responses:
        '200':
          description: OK

  /profile/change-password:
    post:
      tags: [Customer]
      summary: Change password
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: OK

  /refund-requests:
    post:
      tags: [Customer]
      summary: Request refund
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId: { type: string }
                reason: { type: string }
                fileUrls:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: OK

  /rescue:
    post:
      tags: [Customer]
      summary: Request rescue
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lat: { type: number }
                lng: { type: number }
      responses:
        '200':
          description: OK

  /reviews:
    post:
      tags: [Customer]
      summary: Create review
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                carId: { type: string }
                rating: { type: number }
                comment: { type: string }
      responses:
        '200':
          description: OK

  /cars/{carId}/reviews:
    get:
      tags: [Customer]
      summary: Get car reviews
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /search/filters:
    get:
      tags: [Customer]
      summary: Get search filters
      responses:
        '200':
          description: OK

  /search/suggested:
    get:
      tags: [Customer]
      summary: Get suggested cars
      parameters:
        - name: limit
          in: query
          schema: { type: number, default: 9 }
      responses:
        '200':
          description: OK

  /cars/{carId}/similar:
    get:
      tags: [Customer]
      summary: Get similar cars
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: number, default: 6 }
      responses:
        '200':
          description: OK

  /blog/articles:
    get:
      tags: [Customer]
      summary: Get articles
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, published] }
        - name: limit
          in: query
          schema: { type: number }
      responses:
        '200':
          description: OK

  /blog/articles/{id}:
    get:
      tags: [Customer]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /notifications:
    get:
      tags: [Customer]
      summary: Get user notifications
      parameters:
        - name: limit
          in: query
          schema: { type: number, default: 20 }
      responses:
        '200':
          description: OK

  /payments/create:
    post:
      tags: [Payment]
      summary: Create payment
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                carId: { type: string }
                amount: { type: number }
                method: { type: string, enum: [vnpay, momo, zalopay] }
      responses:
        '200':
          description: OK

  /payments/verify/{transactionId}:
    get:
      tags: [Payment]
      summary: Verify payment
      parameters:
        - name: transactionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /payments/{transactionId}/refund:
    post:
      tags: [Payment]
      summary: Refund payment
      parameters:
        - name: transactionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: OK

  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Get dashboard stats
      responses:
        '200':
          description: OK

  /admin/customers:
    get:
      tags: [Admin]
      summary: List customers
      responses:
        '200':
          description: OK

  /admin/customers/{id}/ban:
    post:
      tags: [Admin]
      summary: Ban customer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: OK

  /admin/customers/bulk-ban:
    post:
      tags: [Admin]
      summary: Bulk ban customers
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids: { type: array, items: { type: string } }
                reason: { type: string }
      responses:
        '200':
          description: OK

  /admin/staff:
    get:
      tags: [Admin]
      summary: List staff
      responses:
        '200':
          description: OK
    post:
      tags: [Admin]
      summary: Create staff
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                role: { type: string }
      responses:
        '200':
          description: OK

  /admin/staff/{id}/confirm:
    post:
      tags: [Admin]
      summary: Confirm staff
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /admin/staff/{id}:
    delete:
      tags: [Admin]
      summary: Delete staff
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /admin/showrooms:
    get:
      tags: [Admin]
      summary: List showrooms
      responses:
        '200':
          description: OK
    post:
      tags: [Admin]
      summary: Create showroom
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                contact: { type: string }
                email: { type: string }
                location: { type: string }
                address: { type: string }
      responses:
        '200':
          description: OK

  /admin/showrooms/{id}/approve:
    post:
      tags: [Admin]
      summary: Approve showroom
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /admin/showrooms/{id}/block:
    post:
      tags: [Admin]
      summary: Block showroom
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /admin/refund-requests:
    get:
      tags: [Admin]
      summary: Get pending refund requests
      parameters:
        - name: status
          in: query
          schema: { type: string, default: pending }
      responses:
        '200':
          description: OK

  /admin/refund/{transactionId}/approve:
    post:
      tags: [Admin]
      summary: Approve refund
      parameters:
        - name: transactionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /admin/refund/{id}/reject:
    post:
      tags: [Admin]
      summary: Reject refund
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: OK

  /admin/subscription-packages:
    get:
      tags: [Admin]
      summary: List subscription packages
      responses:
        '200':
          description: OK
    post:
      tags: [Admin]
      summary: Create subscription package
      responses:
        '200':
          description: OK

  /admin/subscription-packages/{id}:
    patch:
      tags: [Admin]
      summary: Update subscription package
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    delete:
      tags: [Admin]
      summary: Delete subscription package
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /admin/system-settings:
    get:
      tags: [Admin]
      summary: Get system settings
      responses:
        '200':
          description: OK
    patch:
      tags: [Admin]
      summary: Update system settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                logoUrl: { type: string }
                hotline: { type: string }
                supportEmail: { type: string }
                facebook: { type: string }
                zalo: { type: string }
                website: { type: string }
      responses:
        '200':
          description: OK

  /staff/dashboard:
    get:
      tags: [Staff]
      summary: Get staff dashboard
      responses:
        '200':
          description: OK

  /staff/pending-cars:
    get:
      tags: [Staff]
      summary: Get pending cars
      responses:
        '200':
          description: OK

  /staff/cars/{id}/approve:
    post:
      tags: [Staff]
      summary: Approve car
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /staff/cars/{id}/reject:
    post:
      tags: [Staff]
      summary: Reject car
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        '200':
          description: OK

  /staff/pending-reviews:
    get:
      tags: [Staff]
      summary: Get pending reviews
      responses:
        '200':
          description: OK

  /staff/reviews/{id}/approve:
    post:
      tags: [Staff]
      summary: Approve review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /staff/reviews/{id}/hide:
    post:
      tags: [Staff]
      summary: Hide review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /staff/fraud-reports:
    get:
      tags: [Staff]
      summary: Get fraud reports
      responses:
        '200':
          description: OK

  /staff/fraud-reports/{id}/resolve:
    post:
      tags: [Staff]
      summary: Resolve fraud report
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /staff/hot-cars:
    get:
      tags: [Staff]
      summary: Get hot cars
      responses:
        '200':
          description: OK
    post:
      tags: [Staff]
      summary: Add hot car
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                carId: { type: string }
      responses:
        '200':
          description: OK

  /staff/hot-cars/{carId}:
    delete:
      tags: [Staff]
      summary: Remove hot car
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /staff/banners:
    get:
      tags: [Staff]
      summary: Get banners
      responses:
        '200':
          description: OK
    post:
      tags: [Staff]
      summary: Create banner
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                link: { type: string }
                type: { type: string, enum: [promotion, featured, partner] }
      responses:
        '200':
          description: OK

  /staff/banners/{id}:
    patch:
      tags: [Staff]
      summary: Update banner
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    delete:
      tags: [Staff]
      summary: Delete banner
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /staff/media:
    get:
      tags: [Staff]
      summary: Get media
      responses:
        '200':
          description: OK

  /staff/media/library:
    get:
      tags: [Staff]
      summary: Get media library
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [image, video] }
        - name: limit
          in: query
          schema: { type: number }
      responses:
        '200':
          description: OK

  /staff/notifications:
    get:
      tags: [Staff]
      summary: Get notifications
      responses:
        '200':
          description: OK

  /staff/notifications/send:
    post:
      tags: [Staff]
      summary: Send notification
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                message: { type: string }
                target: { type: string, enum: [all, showroom, customer] }
      responses:
        '200':
          description: OK

  /showroom/inventory:
    get:
      tags: [Showroom]
      summary: Get inventory
      responses:
        '200':
          description: OK

  /showroom/cars:
    post:
      tags: [Showroom]
      summary: Add car
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CarCreate'
      responses:
        '200':
          description: OK

  /showroom/appointments:
    get:
      tags: [Showroom]
      summary: Get appointments
      responses:
        '200':
          description: OK

  /showroom/appointments/{id}/confirm:
    post:
      tags: [Showroom]
      summary: Confirm appointment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /showroom/qr/verify:
    post:
      tags: [Showroom]
      summary: Verify QR code
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                appointmentId: { type: string }
      responses:
        '200':
          description: OK

  /showroom/transactions:
    get:
      tags: [Showroom]
      summary: Get transactions
      responses:
        '200':
          description: OK

  /showroom/transactions/{id}/confirm:
    post:
      tags: [Showroom]
      summary: Confirm sale
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /showroom/reviews:
    get:
      tags: [Showroom]
      summary: Get reviews
      responses:
        '200':
          description: OK

  /showroom/reviews/{id}/reply:
    post:
      tags: [Showroom]
      summary: Reply to review
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reply: { type: string }
      responses:
        '200':
          description: OK

  /finance/dashboard:
    get:
      tags: [Finance]
      summary: Get finance dashboard
      responses:
        '200':
          description: OK

  /finance/leads:
    get:
      tags: [Finance]
      summary: Get leads
      responses:
        '200':
          description: OK

  /finance/leads/{id}:
    patch:
      tags: [Finance]
      summary: Update lead status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [new, under_review, approved, rejected] }
      responses:
        '200':
          description: OK

  /inspector/tasks:
    get:
      tags: [Inspector]
      summary: Get inspection tasks
      responses:
        '200':
          description: OK

  /inspector/tasks/{carId}:
    get:
      tags: [Inspector]
      summary: Get task by car ID
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /inspector/cars/{carId}/checklist:
    post:
      tags: [Inspector]
      summary: Submit inspection checklist
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                results:
                  type: array
                  items:
                    type: object
                    properties:
                      itemId: { type: string }
                      pass: { type: boolean }
                      media: { type: array, items: { type: string } }
      responses:
        '200':
          description: OK

  /inspector/cars/{carId}/certify:
    post:
      tags: [Inspector]
      summary: Certify vehicle
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /inspector/cars/{carId}/reject-certification:
    post:
      tags: [Inspector]
      summary: Reject certification
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: OK

  /inspector/cars/{carId}/media:
    post:
      tags: [Inspector]
      summary: Upload inspection media
      parameters:
        - name: carId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                itemId: { type: string }
      responses:
        '200':
          description: OK

  /chat/{actor}/conversations:
    get:
      tags: [Chat]
      summary: Get conversations
      parameters:
        - name: actor
          in: path
          required: true
          schema: { type: string, enum: [showroom, finance] }
      responses:
        '200':
          description: OK
    post:
      tags: [Chat]
      summary: Create conversation
      parameters:
        - name: actor
          in: path
          required: true
          schema: { type: string, enum: [showroom, finance] }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                targetUserId: { type: string }
                targetName: { type: string }
                initialMessage: { type: string }
      responses:
        '200':
          description: OK

  /chat/{actor}/conversations/{id}/messages:
    get:
      tags: [Chat]
      summary: Get messages
      parameters:
        - name: actor
          in: path
          required: true
          schema: { type: string, enum: [showroom, finance] }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    post:
      tags: [Chat]
      summary: Send message
      parameters:
        - name: actor
          in: path
          required: true
          schema: { type: string, enum: [showroom, finance] }
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
      responses:
        '200':
          description: OK

  /chat/{actor}/conversations/{id}/read:
    post:
      tags: [Chat]
      summary: Mark as read
      parameters:
        - name: actor
          in: path
          required: true
          schema: { type: string, enum: [showroom, finance] }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        userId: { type: string }

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }

    Car:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        model: { type: string }
        brand: { type: string }
        location: { type: string }
        year: { type: number }
        price: { type: number }
        odo: { type: number }
        fuelType: { type: string, enum: [petrol, diesel, electric, hybrid] }
        transmission: { type: string, enum: [manual, automatic] }
        color: { type: string }
        images: { type: array, items: { type: string } }
        showroomId: { type: string }
        status: { type: string, enum: [available, viewing, deposit, sold, sold_offline] }
        views: { type: number }
        vin: { type: string }
        condition: { type: string, enum: [excellent, good, fair] }

    CarCreate:
      type: object
      properties:
        name: { type: string }
        model: { type: string }
        brand: { type: string }
        year: { type: number }
        price: { type: number }
        odo: { type: number }
        fuelType: { type: string }
        transmission: { type: string }
        color: { type: string }
        images: { type: array, items: { type: string } }
        showroomId: { type: string }
        status: { type: string }
        condition: { type: string }
        vin: { type: string }

    CarUpdate:
      type: object
      additionalProperties: true

    CarType:
      type: object
      properties:
        id: { type: string }
        name: { type: string }

    CarBrand:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        types:
          type: array
          items:
            $ref: '#/components/schemas/CarType'

    CarBrandCreate:
      type: object
      properties:
        name: { type: string }
        types:
          type: array
          items:
            $ref: '#/components/schemas/CarType'
